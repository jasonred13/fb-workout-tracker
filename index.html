<body>
  <div class="top-bar">
    <h1>3-Day Full Body Log</h1>
    <div>
      <label for="weekSelect">Week:</label>
      <input type="number" id="weekSelect" min="1" max="12" value="1">
    </div>
    <button class="btn btn-secondary" id="unitToggleBtn">Unit: lbs</button>
  </div>

  <div>
    <label for="daySelect">Day:</label>
    <select id="daySelect">
      <option value="tuesday">Tuesday – Lower bias</option>
      <option value="thursday">Thursday – Upper bias</option>
      <option value="saturday">Saturday – Balanced + conditioning</option>
    </select>
    <button class="btn" id="loadBtn">Load Day</button>
  </div>

  <div class="small">
    Main lifts: 3 × 6–8. Accessories: 2–3 × 8–15. Double progression. Unit toggle affects labels only.
  </div>

  <h2 class="day-header" id="dayHeader"></h2>
  <div id="exercisesContainer"></div>

  <div style="margin-top: 0.8rem;">
    <button class="btn" id="saveBtn">Save Session</button>
    <button class="btn btn-secondary" id="loadLastBtn">Load Last Saved</button>
    <button class="btn btn-danger" id="clearBtn">Clear This Week/Day</button>
  </div>

  <div class="small" style="margin-top:0.6rem;">
    Data is stored locally on this device using browser localStorage.
  </div>

  <script>
    // --- Global unit state ---
    let currentUnit = "lbs"; // default

    // --- Program with image placeholders ---
    const programTemplate = {
      tuesday: {
        label: "Tuesday – Full Body (Lower-bias)",
        exercises: [
          { name: "Back Squat", sets: 3, repRange: "6–8", img: "images/back_squat.png" },
          { name: "Romanian Deadlift", sets: 3, repRange: "8–10", img: "images/romanian_deadlift.png" },
          { name: "Bench Press", sets: 3, repRange: "6–8", img: "images/bench_press.png" },
          { name: "Barbell Row", sets: 3, repRange: "8–10", img: "images/barbell_row.png" },
          { name: "DB Walking Lunge (optional)", sets: 2, repRange: "10/leg", img: "images/db_lunge.png" },
          { name: "Plank (sec, optional)", sets: 2, repRange: "30–45s", img: "images/plank.png" }
        ]
      },
      thursday: {
        label: "Thursday – Full Body (Upper-bias)",
        exercises: [
          { name: "Bench Press", sets: 3, repRange: "6–8", img: "images/bench_press.png" },
          { name: "Pull-up / Lat Pulldown", sets: 3, repRange: "6–10", img: "images/pullup.png" },
          { name: "Overhead Press", sets: 3, repRange: "6–8", img: "images/overhead_press.png" },
          { name: "DB Row / Chest-Supported Row", sets: 3, repRange: "8–10", img: "images/db_row.png" },
          { name: "Lateral Raises", sets: 2, repRange: "12–15", img: "images/lateral_raise.png" },
          { name: "DB Curls", sets: 2, repRange: "10–12", img: "images/db_curl.png" },
          { name: "Triceps Pressdown / Extensions", sets: 2, repRange: "10–12", img: "images/triceps.png" }
        ]
      },
      saturday: {
        label: "Saturday – Full Body (Balanced + Conditioning)",
        exercises: [
          { name: "Front Squat or Light Back Squat", sets: 3, repRange: "8–10", img: "images/front_squat.png" },
          { name: "Hip Thrust or Light RDL", sets: 3, repRange: "8–10", img: "images/hip_thrust.png" },
          { name: "DB Incline Bench", sets: 3, repRange: "8–10", img: "images/db_incline.png" },
          { name: "Row / Pull-up / Lat Pulldown", sets: 3, repRange: "8–10", img: "images/barbell_row.png" },
          { name: "Core (e.g., Hanging Knee Raise)", sets: 3, repRange: "10–15", img: "images/hanging_knee_raise.png" },
          { name: "Conditioning EMOM (10 min)", sets: 1, repRange: "log notes only", img: "images/cardio.png" }
        ]
      }
    };

    const daySelect = document.getElementById("daySelect");
    const weekSelect = document.getElementById("weekSelect");
    const dayHeader = document.getElementById("dayHeader");
    const exercisesContainer = document.getElementById("exercisesContainer");
    const loadBtn = document.getElementById("loadBtn");
    const saveBtn = document.getElementById("saveBtn");
    const loadLastBtn = document.getElementById("loadLastBtn");
    const clearBtn = document.getElementById("clearBtn");
    const unitToggleBtn = document.getElementById("unitToggleBtn");

    function storageKey(week, day) {
      return `fb_log_week_${week}_day_${day}_unit_${currentUnit}`;
    }

    function buildDayUI(dayKey) {
      const dayData = programTemplate[dayKey];
      dayHeader.textContent = dayData.label;
      exercisesContainer.innerHTML = "";

      dayData.exercises.forEach((ex, exIndex) => {
        const card = document.createElement("div");
        card.className = "exercise-card";
        card.dataset.exerciseIndex = exIndex;

        const titleRow = document.createElement("div");
        titleRow.style.display = "flex";
        titleRow.style.justifyContent = "space-between";
        titleRow.style.alignItems = "center";

        const title = document.createElement("div");
        title.className = "exercise-title";
        title.textContent = ex.name + " (" + ex.repRange + ")";
        titleRow.appendChild(title);

        if (ex.img) {
          const imgLink = document.createElement("a");
          imgLink.href = ex.img;
          imgLink.target = "_blank";
          imgLink.className = "small";
          imgLink.textContent = "View";
          titleRow.appendChild(imgLink);
        }

        card.appendChild(titleRow);

        for (let s = 1; s <= ex.sets; s++) {
          const row = document.createElement("div");
          row.className = "set-row";

          const label = document.createElement("div");
          label.className = "set-label";
          label.textContent = "S" + s;
          row.appendChild(label);

          const wInput = document.createElement("input");
          wInput.type = "number";
          wInput.step = currentUnit === "lbs" ? "2.5" : "1.0";
          wInput.placeholder = currentUnit;
          wInput.dataset.type = "weight";
          wInput.dataset.set = s;
          row.appendChild(wInput);

          const xSpan = document.createElement("span");
          xSpan.textContent = "×";
          row.appendChild(xSpan);

          const rInput = document.createElement("input");
          rInput.type = "number";
          rInput.step = "1";
          rInput.placeholder = "reps";
          rInput.dataset.type = "reps";
          rInput.dataset.set = s;
          row.appendChild(rInput);

          card.appendChild(row);
        }

        exercisesContainer.appendChild(card);
      });
    }

    function saveSession() {
      const week = parseInt(weekSelect.value, 10);
      const dayKey = daySelect.value;
      const key = storageKey(week, dayKey);

      const session = {
        week,
        dayKey,
        unit: currentUnit,
        timestamp: new Date().toISOString(),
        exercises: []
      };

      const cards = exercisesContainer.querySelectorAll(".exercise-card");
      cards.forEach(card => {
        const exIdx = parseInt(card.dataset.exerciseIndex, 10);
        const exTemplate = programTemplate[dayKey].exercises[exIdx];

        const sets = [];
        const inputs = card.querySelectorAll("input");
        inputs.forEach(input => {
          const setNumber = parseInt(input.dataset.set, 10);
          const type = input.dataset.type;
          if (!sets[setNumber - 1]) {
            sets[setNumber - 1] = { weight: "", reps: "" };
          }
          if (type === "weight") {
            sets[setNumber - 1].weight = input.value;
          } else if (type === "reps") {
            sets[setNumber - 1].reps = input.value;
          }
        });

        session.exercises.push({
          name: exTemplate.name,
          repRange: exTemplate.repRange,
          sets
        });
      });

      localStorage.setItem(key, JSON.stringify(session));
      alert(`Session saved for Week ${week}, ${programTemplate[dayKey].label} (${currentUnit}).`);
    }

    function loadSession(week, dayKey) {
      const key = storageKey(week, dayKey);
      const raw = localStorage.getItem(key);
      if (!raw) {
        alert(`No saved session found for Week ${week}, this day (${currentUnit}).`);
        return;
      }
      const session = JSON.parse(raw);

      buildDayUI(dayKey);

      const cards = exercisesContainer.querySelectorAll(".exercise-card");
      cards.forEach((card, idx) => {
        const exSession = session.exercises[idx];
        if (!exSession) return;

        const inputs = card.querySelectorAll("input");
        inputs.forEach(input => {
          const setNumber = parseInt(input.dataset.set, 10);
          const setData = exSession.sets[setNumber - 1];
          if (!setData) return;
          if (input.dataset.type === "weight") {
            input.value = setData.weight || "";
          } else if (input.dataset.type === "reps") {
            input.value = setData.reps || "";
          }
        });
      });
    }

    loadBtn.addEventListener("click", () => {
      const dayKey = daySelect.value;
      buildDayUI(dayKey);
    });

    saveBtn.addEventListener("click", saveSession);

    loadLastBtn.addEventListener("click", () => {
      const week = parseInt(weekSelect.value, 10);
      const dayKey = daySelect.value;
      loadSession(week, dayKey);
    });

    clearBtn.addEventListener("click", () => {
      const week = parseInt(weekSelect.value, 10);
      const dayKey = daySelect.value;
      const key = storageKey(week, dayKey);
      localStorage.removeItem(key);
      alert(`Cleared saved data for Week ${week}, this day (${currentUnit}).`);
      buildDayUI(dayKey);
    });

    unitToggleBtn.addEventListener("click", () => {
      currentUnit = currentUnit === "lbs" ? "kg" : "lbs";
      unitToggleBtn.textContent = `Unit: ${currentUnit}`;
      // Rebuild current day UI with new placeholders/steps
      buildDayUI(daySelect.value);
    });

    // Initial load
    buildDayUI(daySelect.value);
  </script>
</body>
